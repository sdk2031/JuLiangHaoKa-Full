<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #fff;
      }
    </style>
    <script>
      (function () {
        function getVersion(callback) {
          var done = false;
          function finish(v) {
            if (done) return;
            done = true;
            callback(v === "v2" ? "v2" : "v1");
          }
          function parseAndFinish(text) {
            try {
              var res = JSON.parse(text || "{}");
              var v = (((res || {}).data || {}).h5_client_version || "v1") + "";
              finish(v);
              return true;
            } catch (e) {
              return false;
            }
          }
          function requestTemplate(url, onFail) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url + (url.indexOf("?") > -1 ? "&" : "?") + "_ts=" + Date.now(), true);
            xhr.setRequestHeader("Cache-Control", "no-cache, no-store, must-revalidate");
            xhr.setRequestHeader("Pragma", "no-cache");
            xhr.timeout = 3500;
            xhr.onreadystatechange = function () {
              if (xhr.readyState !== 4) return;
              if (xhr.status >= 200 && xhr.status < 300 && parseAndFinish(xhr.responseText)) return;
              onFail();
            };
            xhr.onerror = onFail;
            xhr.ontimeout = onFail;
            xhr.send(null);
          }
          try {
            requestTemplate("/openapi/system/getTemplate", function () {
              requestTemplate("/openapi/configh5/getTemplate", function () {
                finish("v1");
              });
            });
          } catch (e) {
            finish("v1");
          }
        }

        function fail(msg) {
          document.body.innerHTML =
            '<div style="padding:24px;color:#666;font:14px/1.8 Microsoft YaHei,sans-serif;">' +
            (msg || "系统加载失败，请刷新重试") +
            "</div>";
        }

        function loadVersion(version) {
          var basePath = version === "v2" ? "/h5-v2" : "/h5-v1";
          var targetIndex = basePath + "/index.html?_ts=" + Date.now();
          var hardDone = false;
          var hardTimer = setTimeout(function () {
            if (hardDone) return;
            hardDone = true;
            window.location.replace(basePath + "/#" + (window.location.hash || "").replace(/^#/, ""));
          }, 7000);

          function clearHardTimer() {
            if (hardTimer) {
              clearTimeout(hardTimer);
              hardTimer = null;
            }
          }

          var xhr = new XMLHttpRequest();
          xhr.open("GET", targetIndex, true);
          xhr.timeout = 5000;
          xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            if (!(xhr.status >= 200 && xhr.status < 300)) {
              if (!hardDone) {
                hardDone = true;
                window.location.replace(basePath + "/#" + (window.location.hash || "").replace(/^#/, ""));
              }
              return;
            }

            var htmlText = xhr.responseText || "";
            try {
              var parser = new DOMParser();
              var doc = parser.parseFromString(htmlText, "text/html");

              if (doc.title) {
                document.title = doc.title;
              }

              if (!document.getElementById("app")) {
                var app = document.createElement("div");
                app.id = "app";
                document.body.innerHTML = "";
                document.body.appendChild(app);
              }

              var linkEls = doc.querySelectorAll('link[rel="stylesheet"][href]');
              for (var i = 0; i < linkEls.length; i++) {
                var href = linkEls[i].getAttribute("href") || "";
                if (!href) continue;
                var link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = href.indexOf("http") === 0 ? href : basePath + "/" + href.replace(/^\.?\//, "");
                document.head.appendChild(link);
              }

              var scriptEls = doc.querySelectorAll("script[src]");
              var loaded = false;
              for (var j = 0; j < scriptEls.length; j++) {
                var src = scriptEls[j].getAttribute("src") || "";
                if (!src) continue;
                var script = document.createElement("script");
                var type = scriptEls[j].getAttribute("type");
                if (type) script.type = type;
                if (scriptEls[j].hasAttribute("crossorigin")) script.setAttribute("crossorigin", "");
                script.src = src.indexOf("http") === 0 ? src : basePath + "/" + src.replace(/^\.?\//, "");
                document.body.appendChild(script);
                loaded = true;
              }

              if (!loaded) {
                fail("未找到入口脚本");
              } else {
                clearHardTimer();
              }
            } catch (e) {
              fail("系统入口加载失败，请刷新重试");
            }
          };
          xhr.onerror = function () {
            if (!hardDone) {
              hardDone = true;
              window.location.replace(basePath + "/#" + (window.location.hash || "").replace(/^#/, ""));
            }
          };
          xhr.ontimeout = function () {
            if (!hardDone) {
              hardDone = true;
              window.location.replace(basePath + "/#" + (window.location.hash || "").replace(/^#/, ""));
            }
          };
          xhr.send(null);
        }

        getVersion(loadVersion);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
